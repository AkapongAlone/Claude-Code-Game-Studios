# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: vision_range
    status: active
    source: design/gdd/fog-of-war.md
    referenced_by:
      - design/gdd/fog-of-war.md
    variables:
      - unit_type
      - terrain_hex
      - squad_vision_bonus
    output_range: [2, 5]
    expression: "base_vision[unit_type] + terrain.vision_modifier(hex) + squad.vision_bonus"
    notes: "base_vision: INF=2, LI=3, CAV=3, ART=2. Hill grants +1 via terrain.vision_modifier.
      squad.vision_bonus is summed from passive effects (Bon Stratagem: +1 all squads).
      Tactical AI GDD will reference this formula for enemy behavior planning."
    added: 2026-06-12
    revised: ""

  - name: ap_pool
    status: active
    source: design/gdd/hex-movement.md
    referenced_by:
      - design/gdd/hex-movement.md
      - design/gdd/morale-system.md
    variables:
      - unit_type
      - ldr
    output_range: [2, 7]
    expression: "min(base_ap[unit_type] + floor((ldr - 1) / 34), max_ap[unit_type])"
    notes: "base_ap: INF=3, LI=4, CAV=5, ART=2. max_ap: INF=5, LI=6, CAV=7, ART=4.
      ldr_ap_divisor=34 yields breakpoints LDR 1-34:+0, 35-67:+1, 68-100:+2.
      Morale System reads ap_pool as the routing movement budget for BROKEN squads.
      Tactical AI reads reachable_hexes(squad) which depends on ap_pool."
    added: 2026-06-12
    revised: ""

  - name: route_fraction
    status: active
    source: design/gdd/victory-defeat-conditions.md
    referenced_by:
      - design/gdd/victory-defeat-conditions.md
      - design/gdd/tactical-hud.md
    variables:
      - broken_on_map
      - routed_off_map
      - dead_squads
      - starting_squads
    output_range: [0.0, 1.0]
    expression: "(broken_on_map + routed_off_map + dead_squads) / starting_squads"
    notes: "broken_on_map = squads with morale_state==BROKEN still on map.
      routed_off_map = squads that exited via routing. dead_squads = squads removed at HP=0.
      starting_squads is fixed at battle start (denominator never changes).
      Tactical AI GDD and Tactical HUD GDD will reference this formula."
    added: 2026-06-12
    revised: ""

  - name: duel_resolve
    status: active
    source: design/gdd/duel-system.md
    referenced_by:
      - design/gdd/duel-system.md
      - design/gdd/duel-ui.md
    variables:
      - chr
    output_range: [40, 90]
    expression: "floor(CHR / 2) + 40"
    notes: "Officer's HP pool inside a duel. Derived once at duel start from permanent CHR stat.
      Named values: Kaster=84, Alexsen=77, Thane=62, Sander=75, Bon=71, Jin Tao=65, Zhuge Jian=80.
      Duel UI GDD and Officer Passive Ability GDD will reference this formula.
      Offset was raised from 30 to 40 (2026-06-12) to prevent high-WAR/low-CHR officers being too fragile."
    added: 2026-06-12
    revised: ""

  - name: duel_stamina
    status: active
    source: design/gdd/duel-system.md
    referenced_by:
      - design/gdd/duel-system.md
      - design/gdd/duel-ui.md
    variables:
      - int_stat
    output_range: [5, 15]
    expression: "floor(INT / 10) + 5"
    notes: "Per-duel action budget. Resets fresh each duel — not persistent across duels in same battle.
      Named values: Zhuge Jian=14, Kaster=14, Bon=14, Thane=12, Sander=11, Alexsen=9.
      Duel UI GDD and Officer Passive Ability GDD will reference this formula."
    added: 2026-06-12
    revised: ""

  - name: duel_attack_damage
    status: active
    source: design/gdd/duel-system.md
    referenced_by:
      - design/gdd/duel-system.md
      - design/gdd/duel-ui.md
    variables:
      - war
    output_range: [5, 15]
    expression: "floor(WAR / 10) + 5"
    notes: "Damage dealt when officer wins an Attack stance match-up.
      Named values: Alexsen=14, Thane=14, Kaster=13, Sander=12, Bon=10, Zhuge Jian=8.
      Officer Passive Ability GDD will reference this for Crushing Blow damage calculation."
    added: 2026-06-12
    revised: ""

  - name: is_flanking
    status: active
    source: design/gdd/facing-and-flank.md
    referenced_by:
      - design/gdd/facing-and-flank.md
      - design/gdd/combat-resolution.md
      - design/gdd/morale-system.md
    variables:
      - attacker_hex
      - defender_id
      - defender_facing_direction
      - attacker_in_forest
      - attacker_moved_this_turn
      - target_moved_this_turn
    output_range: [false, true]
    expression: "(R - D + 6) mod 6 >= 3  OR  (attacker_in_forest AND NOT attacker_moved_this_turn AND target_moved_this_turn)"
    notes: "R = cube direction index from defender to attacker. D = defender facing_direction [0-5].
      Combat Resolution reads this as flanking_mod (1.3 if true, 1.0 if false).
      Morale reads is_flanked_this_turn — fires morale_damage_flank = 10 once per turn if true."
    added: 2026-06-12
    revised: ""

